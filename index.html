<!DOCTYPE html>
<html>
<head>
  <title>Free Image Compressor Online</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
      margin: 0;
    }

    .header {
      background: #4CAF50;
      color: white;
      padding: 20px;
    }

    .container {
      margin-top: 50px;
    }

    input {
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 12px 25px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    .footer {
      margin-top: 50px;
      padding: 10px;
      background: #222;
      color: white;
    }

    a {
      color: lightblue;
      margin: 5px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Free Image Compressor</h1>
    <p>Compress your images instantly 🚀</p>
  </div>

  <div class="container">
    <input type="file" id="upload">
    <br>
    <button onclick="compressImage()">Compress Image</button>
    <br><br>
    <a id="download" style="display:none;">Download</a>
  </div>

  <div class="footer">
    <a href="#">Privacy</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>

<script>
function compressImage() {
  const file = document.getElementById("upload").files[0];
  if (!file) return alert("Upload image first!");

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.src = e.target.result;

    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = img.width;
      canvas.height = img.height;

      ctx.drawImage(img, 0, 0);

      const compressed = canvas.toDataURL("image/jpeg", 0.5);

      const download = document.getElementById("download");
      download.href = compressed;
      download.download = "compressed.jpg";
      download.style.display = "inline";
      download.innerText = "Download Image";
    }
  }
  reader.readAsDataURL(file);
}
</script>

</body>
</html>
